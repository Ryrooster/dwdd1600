<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Rylee Moore">
    <meta name="description" content="Connecting through an online book club">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="club.css">
    <title>Upcoming Book</title>
</head>

<body>
    <!-- Start the page head -->
    <header>
        <span>The Reading Nook</span>
    </header>

    <!-- start the page navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Book Club</a></li>
            <li><a href="monthly.html">Monthly Book</a></li>
            <li><a href="past.html">Past Reads</a></li>
            <li class="active"><a href="upcoming.html">Upcoming Book</a></li>

        </ul>
    </nav>
    <!-- start the page main content -->
    <main>
        <h1>Pick the Next Book to Read!</h1>
        <form method="get" class="myForm" action="thanks.html">

            <fieldset>
            <legend>Club Member Information</legend>
            <label>First Name*<input type="text" name="fname" required></label>
            <label>Last Name*<input type="text" name="lname" required></label>
            <label>Email*<input type="email" name="email" required placeholder="youremail@address.com"></label>
            </fieldset>

            <fieldset>
            <legend>Book Selection</legend>
            <label><input type="radio" name="selection" value="One">The Floating World by Axie Oh</label>            
            <label><input type="radio" name="selection" value="two">The Phantom of the Opera by Gaston Leroux</label>
            <label><input type="radio" name="selection" value="three">Binding 13 by Chloe Walsh</label>
            </fieldset>

             <fieldset>
            <label>Are you planning on joining us for the next book club meeting?
            <select name="time">
                <option value="">Please Select</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
                <option value="maybe">Maybe</option>
                <option value="depends">Depends on the final book pick</option>
            </select>
            </label>

            <p>If you are planing on attending, please select availability:</p>
            <legend>Preferred Club Meeting Day</legend>
            <label><input type="checkbox" name="comments" value="26th">October 26th</label>
            <label><input type="checkbox" name="comments" value="27th">October 27th</label>
            <label><input type="checkbox" name="comments" value="28th">October 28th</label>
            <label><input type="checkbox" name="comments" value="29th">October 29th</label>
            <label><input type="checkbox" name="comments" value="30th">October 30th</label>
            <label><input type="checkbox" name="comments" value="31st">October 31st</label>        
            </fieldset>

            <label>Do you have any suggestions for future book picks or club activities?
                <textarea name="suggestions"></textarea>
            </label>
            

        <input type="submit" value="Send Input">
        </form>
    </main>
    <!-- start the page footer -->
    <footer>
        <p>&copy; 2025 &bull; Rylee Moore &bull; Web Essentials</p>
    </footer>

</body>

</html>
